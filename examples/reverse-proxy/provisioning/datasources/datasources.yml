apiVersion: 1

datasources:
  # Option 1: transparent proxy, Jaeger served under /jaeger/ui with --query.base-path
  - name: Jaeger-Option1
    uid: jaeger-option1
    type: jaegertracing-jaeger-datasource
    url: http://localhost:18080/jaeger/ui
    isDefault: true
    jsonData:
      jaegerPublicURL: http://localhost:18080/jaeger/ui

  # Option 2: prefix-stripping proxy, base path auto-detected by Jaeger UI (since 2.18.0)
  - name: Jaeger-Option2
    uid: jaeger-option2
    type: jaegertracing-jaeger-datasource
    url: http://localhost:18081/jaeger/ui
    jsonData:
      jaegerPublicURL: http://localhost:18081/jaeger/ui
