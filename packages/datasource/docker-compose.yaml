services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    container_name: jaegertracing-jaeger-datasource
    environment:
      GF_LOG_FILTERS: plugin.jaegertracing-jaeger-datasource:debug
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: jaegertracing-jaeger-datasource

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaegertracing-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  hotrod:
    image: jaegertracing/example-hotrod:latest
    container_name: jaegertracing-hotrod
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      - jaeger
