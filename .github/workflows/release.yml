name: Release

on:
  release:
    types: [published]

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG}' does not match expected format v<major>.<minor>.<patch>"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and package plugins
        run: make build-release VERSION="${{ steps.version.outputs.version }}"

      - name: Validate panel plugin
        run: |
          docker run --rm \
            -v "$PWD/dist/jaegertracing-jaeger-panel-${{ steps.version.outputs.version }}.zip:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

      - name: Validate datasource plugin
        run: |
          docker run --rm \
            -v "$PWD/dist/jaegertracing-jaeger-datasource-${{ steps.version.outputs.version }}.zip:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

      - name: Upload release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "${{ github.ref_name }}" \
            "dist/jaegertracing-jaeger-panel-${VERSION}.zip" \
            "dist/jaegertracing-jaeger-datasource-${VERSION}.zip" \
            dist/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
