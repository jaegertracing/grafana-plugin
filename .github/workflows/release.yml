name: Release

on:
  release:
    types: [published]

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and package plugins
        run: make build-release VERSION="${{ steps.version.outputs.version }}"

      - name: Validate panel plugin
        run: |
          docker run --rm \
            -v "$PWD/dist/jaegertracing-jaeger-panel-${{ steps.version.outputs.version }}.zip:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

      - name: Validate datasource plugin
        run: |
          docker run --rm \
            -v "$PWD/dist/jaegertracing-jaeger-datasource-${{ steps.version.outputs.version }}.zip:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

      - name: Upload release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "${{ github.ref_name }}" \
            "dist/jaegertracing-jaeger-panel-${VERSION}.zip" \
            "dist/jaegertracing-jaeger-datasource-${VERSION}.zip" \
            dist/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
